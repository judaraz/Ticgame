<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Red vs Blue | Multiplier Madness | Telegram Mini App</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1a 0%, #020408 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Orbitron', 'Impact', monospace;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .game-wrapper {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            border-radius: clamp(1rem, 5vw, 3rem);
            padding: clamp(0.8rem, 3vw, 1.2rem);
            box-shadow: 0 25px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(255,80,80,0.4);
            width: 100%;
            max-width: 800px;
            margin: auto;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 50%;
            box-shadow: 0 0 0 5px #fff, 0 15px 35px rgba(0,0,0,0.7), inset 0 0 30px rgba(0,0,0,0.5);
            cursor: none;
            background: #010101;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            max-width: min(90vw, 90vh);
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(0.5rem, 2vw, 1rem);
            gap: clamp(0.5rem, 2vw, 1rem);
            flex-wrap: wrap;
            background: #0b0f16cc;
            backdrop-filter: blur(8px);
            padding: clamp(0.4rem, 2vw, 0.6rem) clamp(0.8rem, 3vw, 1.5rem);
            border-radius: clamp(1.5rem, 5vw, 3rem);
            border-bottom: 2px solid #ff4d4d;
        }

        .team-stats {
            display: flex;
            gap: clamp(0.8rem, 3vw, 2rem);
            background: #00000066;
            padding: clamp(0.2rem, 1.5vw, 0.3rem) clamp(0.8rem, 3vw, 1.2rem);
            border-radius: clamp(1rem, 4vw, 2rem);
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            align-items: baseline;
            gap: clamp(4px, 1.5vw, 8px);
            font-weight: bold;
            font-size: clamp(0.9rem, 3.5vw, 1.3rem);
            font-family: monospace;
        }

        .red-stat { color: #ff6666; text-shadow: 0 0 3px #ff0000; }
        .blue-stat { color: #66aaff; text-shadow: 0 0 3px #0088ff; }
        .stat-label { font-size: clamp(0.6rem, 2.5vw, 0.75rem); text-transform: uppercase; letter-spacing: 2px; color: #bbb; }
        .stat-value { font-size: clamp(1.2rem, 5vw, 1.9rem); font-weight: 900; background: #000000aa; padding: 0 clamp(8px, 3vw, 12px); border-radius: clamp(1rem, 4vw, 2rem); min-width: clamp(40px, 12vw, 65px); text-align: center; }

        .winner-msg {
            background: gold;
            color: #1a1a2e;
            padding: clamp(0.4rem, 2vw, 0.5rem) clamp(0.8rem, 3vw, 1.5rem);
            border-radius: clamp(1.5rem, 5vw, 3rem);
            font-weight: bold;
            font-size: clamp(0.9rem, 3.5vw, 1.2rem);
            text-align: center;
            margin-top: clamp(0.5rem, 2vw, 1rem);
        }

        button {
            background: #2c2f3a;
            border: none;
            font-family: inherit;
            font-weight: bold;
            padding: clamp(0.4rem, 2vw, 0.5rem) clamp(0.8rem, 3vw, 1.2rem);
            border-radius: clamp(1rem, 4vw, 2rem);
            color: white;
            cursor: pointer;
            font-size: clamp(0.8rem, 3vw, 1rem);
            transition: all 0.1s;
            box-shadow: 0 3px 0 #15161c;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #15161c; }
        .reset-btn { background: #8a2a2a; box-shadow: 0 3px 0 #4a1010; }
        .speed-hint { font-size: clamp(0.6rem, 2.5vw, 0.7rem); background: #2a2a33; padding: clamp(0.2rem, 1.5vw, 0.2rem) clamp(0.5rem, 2vw, 0.8rem); border-radius: clamp(1rem, 4vw, 2rem); color: #ffaa66; font-family: monospace; white-space: nowrap; }

        .multiplier-badge {
            background: linear-gradient(135deg, #ffaa33, #ff6633);
            padding: clamp(0.2rem, 1.5vw, 0.3rem) clamp(0.6rem, 2.5vw, 1rem);
            border-radius: clamp(1rem, 4vw, 2rem);
            font-weight: bold;
            font-size: clamp(0.9rem, 3.5vw, 1.1rem);
            color: #fff;
            text-shadow: 0 0 3px black;
            animation: pulse 1s infinite;
            white-space: nowrap;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        .game-footer {
            text-align: center;
            margin-top: clamp(0.5rem, 2vw, 1rem);
            font-size: clamp(0.55rem, 2vw, 0.7rem);
            color: #aaa;
            font-family: monospace;
            padding: 0 clamp(0.5rem, 2vw, 1rem);
        }

        .ad-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: #ffaa33;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            z-index: 2000;
            pointer-events: none;
            animation: fadeOut 2s ease forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        @media (max-width: 600px) {
            .info-panel {
                flex-direction: column;
                align-items: stretch;
            }
            .team-stats {
                justify-content: center;
            }
            .multiplier-badge, .speed-hint {
                text-align: center;
            }
        }
    </style>
    <!-- Taddy.pro SDK -->
    <script src="https://sdk.taddy.pro/web/taddy.min.js" data-pub-id="c9cdd59664e9f51f7ddf938ac2d2f008"></script>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div>
    <div class="game-wrapper">
        <div class="info-panel">
            <div class="team-stats">
                <div class="stat">
                    <span class="stat-label red-stat">🔴 RED LINES</span>
                    <span class="stat-value" id="redLinesCounter">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label blue-stat">🔵 BLUE LINES</span>
                    <span class="stat-value" id="blueLinesCounter">0</span>
                </div>
            </div>
            <div style="display: flex; gap: clamp(6px, 2vw, 10px); align-items: center; flex-wrap: wrap; justify-content: center;">
                <div class="multiplier-badge" id="multiplierDisplay">x1</div>
                <div class="speed-hint" id="speedStatus">⚡ normal</div>
                <button class="reset-btn" id="resetGameBtn">⟳ RESTART</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="750" height="750"></canvas>

        <div id="winnerDisplay" class="winner-msg" style="display: none;"></div>
        <div class="game-footer">
            🎯 Each wall touch → LINE attached + points multiplied by current multiplier!<br>
            ⚡ 2x, 3x, 4x, 5x powerups appear randomly → collect for 5 sec boost | First to 50 LINES wins!
        </div>
    </div>
</div>

<script>
    (function(){
        // ----- TELEGRAM INTEGRATION -----
        let tg = null;
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                tg.enableClosingConfirmation();
                
                const themeParams = tg.themeParams;
                if (themeParams) {
                    document.body.style.background = themeParams.bg_color || '#020408';
                }
            }
        } catch(e) {
            console.warn('Telegram WebApp not available', e);
        }
        
        // ----- TADDY.PRO ADS INTEGRATION -----
        let taddySDK = null;
        let adReady = false;
        let adCooldown = false;
        let pendingAdCallback = null;
        
        if (typeof Taddy !== 'undefined') {
            taddySDK = Taddy;
            taddySDK.init({
                onReady: function() {
                    console.log('Taddy.pro ads ready');
                    adReady = true;
                },
                onError: function(err) {
                    console.warn('Taddy ad error:', err);
                }
            });
        }
        
        // Show ad notification
        function showAdNotification(message) {
            const notif = document.createElement('div');
            notif.className = 'ad-notification';
            notif.innerText = message || '📺 Showing ad...';
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }
        
        // Function to show ad during gameplay (random)
        function showRandomAd() {
            if (!adReady || !taddySDK || adCooldown) return;
            // 12% chance to show ad during gameplay, but not too frequent
            if (Math.random() < 0.12 && gameActive && !winner && redBall.linesCount > 5 && blueBall.linesCount > 5) {
                adCooldown = true;
                showAdNotification('⚡ Random ad incoming!');
                try {
                    taddySDK.showAd({
                        type: 'interstitial',
                        onClose: function() {
                            console.log('Random ad closed');
                            setTimeout(() => { adCooldown = false; }, 3000);
                        }
                    });
                } catch(e) { 
                    console.warn(e);
                    adCooldown = false;
                }
            }
        }
        
        // Function to show ad when game finishes
        function showEndGameAd(callback) {
            if (!adReady || !taddySDK) {
                if (callback) callback();
                return;
            }
            showAdNotification('🏆 Game finished! Watch ad to continue');
            try {
                taddySDK.showAd({
                    type: 'rewarded',
                    onClose: function() {
                        console.log('End game ad closed');
                        if (callback) callback();
                    }
                });
            } catch(e) { 
                console.warn(e);
                if (callback) callback();
            }
        }
        
        // ----- CANVAS with responsive sizing -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const container = canvas.parentElement;
            const size = Math.min(window.innerWidth - 40, window.innerHeight - 200, 750);
            canvas.style.width = `${size}px`;
            canvas.style.height = `${size}px`;
            canvas.width = 750;
            canvas.height = 750;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // arena: perfect circle boundary
        const centerX = 375;
        const centerY = 375;
        const radius = 363;
        
        // LINE SYSTEM
        let redLines = [];
        let blueLines = [];
        
        // ball objects
        let redBall = {
            x: centerX - 85,
            y: centerY - 15,
            vx: 2.5,
            vy: -1.9,
            color: '#ff4444',
            glow: '#ff7777',
            radius: 14,
            speedMultiplier: 1.0,
            speedTimer: 0,
            hasBoost: false,
            linesCount: 0,
            currentMultiplier: 1
        };
        
        let blueBall = {
            x: centerX + 85,
            y: centerY + 20,
            vx: -2.3,
            vy: 1.8,
            color: '#4488ff',
            glow: '#88aaff',
            radius: 14,
            speedMultiplier: 1.0,
            speedTimer: 0,
            hasBoost: false,
            linesCount: 0,
            currentMultiplier: 1
        };
        
        let multiplierPowerup = {
            active: false,
            x: 0, y: 0,
            radius: 14,
            timer: 0,
            value: 2
        };
        
        let gameActive = true;
        let winner = null;
        let animationId = null;
        let frameCounter = 0;
        
        // DOM elements
        const redLinesSpan = document.getElementById('redLinesCounter');
        const blueLinesSpan = document.getElementById('blueLinesCounter');
        const winnerDiv = document.getElementById('winnerDisplay');
        const resetBtn = document.getElementById('resetGameBtn');
        const speedStatusSpan = document.getElementById('speedStatus');
        const multiplierDisplay = document.getElementById('multiplierDisplay');
        
        function updateUI() {
            redLinesSpan.innerText = redBall.linesCount;
            blueLinesSpan.innerText = blueBall.linesCount;
            
            if(redBall.hasBoost) {
                speedStatusSpan.innerHTML = `🔴 ${redBall.currentMultiplier}x BOOST!`;
                speedStatusSpan.style.color = '#ffaa66';
                speedStatusSpan.style.background = '#441111';
                multiplierDisplay.innerHTML = `x${redBall.currentMultiplier}`;
                multiplierDisplay.style.background = 'linear-gradient(135deg, #ff6633, #ff3333)';
            } else if(blueBall.hasBoost) {
                speedStatusSpan.innerHTML = `🔵 ${blueBall.currentMultiplier}x BOOST!`;
                speedStatusSpan.style.color = '#aaffdd';
                speedStatusSpan.style.background = '#112244';
                multiplierDisplay.innerHTML = `x${blueBall.currentMultiplier}`;
                multiplierDisplay.style.background = 'linear-gradient(135deg, #33aaff, #2266cc)';
            } else {
                speedStatusSpan.innerHTML = '⚡ normal';
                speedStatusSpan.style.color = '#ffaa66';
                speedStatusSpan.style.background = '#2a2a33';
                multiplierDisplay.innerHTML = 'x1';
                multiplierDisplay.style.background = 'linear-gradient(135deg, #ffaa33, #ff6633)';
            }
        }
        
        function createFloatingText(x, y, text, color) {
            const rect = canvas.getBoundingClientRect();
            const div = document.createElement('div');
            div.innerText = text;
            div.style.position = 'fixed';
            div.style.left = (rect.left + x * (rect.width / 750)) + 'px';
            div.style.top = (rect.top + y * (rect.height / 750) - 20) + 'px';
            div.style.color = color;
            div.style.fontWeight = 'bold';
            div.style.fontSize = 'clamp(12px, 4vw, 18px)';
            div.style.fontFamily = 'monospace';
            div.style.textShadow = '0 0 3px black';
            div.style.pointerEvents = 'none';
            div.style.zIndex = '1000';
            div.style.transition = 'transform 0.5s ease-out, opacity 0.5s';
            document.body.appendChild(div);
            requestAnimationFrame(() => {
                div.style.transform = 'translateY(-32px)';
                div.style.opacity = '0';
            });
            setTimeout(() => div.remove(), 500);
        }
        
        function addAttachedLine(ball, wallContactX, wallContactY, colorType, multiplierValue) {
            if (!gameActive) return;
            
            const linesToAdd = multiplierValue;
            
            for (let i = 0; i < linesToAdd; i++) {
                const anchorX = wallContactX + (Math.cos(Date.now() + i) * 0.8);
                const anchorY = wallContactY + (Math.sin(Date.now() + i) * 0.8);
                
                const lineObj = {
                    ball: ball,
                    anchorX: anchorX,
                    anchorY: anchorY,
                    color: colorType === 'red' ? '#ff6666' : '#66aaff',
                    width: 2.5
                };
                
                if (colorType === 'red') {
                    redLines.push(lineObj);
                } else {
                    blueLines.push(lineObj);
                }
                if (colorType === 'red' && redLines.length > 250) redLines.shift();
                if (colorType === 'blue' && blueLines.length > 250) blueLines.shift();
            }
            
            if (colorType === 'red') {
                redBall.linesCount += linesToAdd;
            } else {
                blueBall.linesCount += linesToAdd;
            }
            
            createFloatingText(ball.x, ball.y, `+${linesToAdd} LINES! (${multiplierValue}x)`, colorType === 'red' ? '#ff8888' : '#88aaff');
            updateUI();
            checkWinner();
            
            // Random ad trigger during gameplay
            showRandomAd();
        }
        
        function checkWinner() {
            if (!gameActive) return true;
            if (redBall.linesCount >= 50) {
                gameActive = false;
                winner = 'red';
                winnerDiv.style.display = 'block';
                winnerDiv.innerHTML = '🏆🔴 RED VICTORY! FIRST TO 50 LINES! 🔴🏆<br>🔥 MULTIPLIER MADNESS 🔥';
                winnerDiv.style.background = '#ff4d4ddd';
                if (animationId) cancelAnimationFrame(animationId);
                draw();
                // Show ad when game finishes - with callback to allow reset after
                showEndGameAd(function() {
                    console.log('End game ad completed, ready for restart');
                });
                if (tg) tg.HapticFeedback.notificationOccurred('success');
                return true;
            } else if (blueBall.linesCount >= 50) {
                gameActive = false;
                winner = 'blue';
                winnerDiv.style.display = 'block';
                winnerDiv.innerHTML = '🏆🔵 BLUE VICTORY! FIRST TO 50 LINES! 🔵🏆<br>💪 MULTIPLIER DOMINATION 💪';
                winnerDiv.style.background = '#3388ffdd';
                if (animationId) cancelAnimationFrame(animationId);
                draw();
                showEndGameAd(function() {
                    console.log('End game ad completed');
                });
                if (tg) tg.HapticFeedback.notificationOccurred('success');
                return true;
            }
            return false;
        }
        
        function spawnMultiplierPowerup() {
            if (multiplierPowerup.active) return;
            let angle = Math.random() * Math.PI * 2;
            let r = Math.random() * (radius - 45) + 30;
            let px = centerX + Math.cos(angle) * r;
            let py = centerY + Math.sin(angle) * r;
            multiplierPowerup.x = px;
            multiplierPowerup.y = py;
            multiplierPowerup.active = true;
            multiplierPowerup.timer = 280;
            const multipliers = [2, 3, 4, 5];
            multiplierPowerup.value = multipliers[Math.floor(Math.random() * multipliers.length)];
        }
        
        function applyMultiplierBoost(ball, multiplierValue) {
            if (!gameActive) return;
            ball.speedMultiplier = multiplierValue;
            ball.currentMultiplier = multiplierValue;
            ball.hasBoost = true;
            ball.speedTimer = 300;
            updateUI();
            createFloatingText(ball.x, ball.y, `⚡ ${multiplierValue}x SPEED! 5s`, '#ffdd77');
            if (tg) tg.HapticFeedback.impactOccurred('light');
        }
        
        function updateBoosts() {
            if (redBall.hasBoost) {
                redBall.speedTimer--;
                if (redBall.speedTimer <= 0) {
                    redBall.speedMultiplier = 1.0;
                    redBall.hasBoost = false;
                    redBall.currentMultiplier = 1;
                }
            }
            if (blueBall.hasBoost) {
                blueBall.speedTimer--;
                if (blueBall.speedTimer <= 0) {
                    blueBall.speedMultiplier = 1.0;
                    blueBall.hasBoost = false;
                    blueBall.currentMultiplier = 1;
                }
            }
            updateUI();
        }
        
        function updatePowerup() {
            if (!gameActive) return;
            if (multiplierPowerup.active) {
                multiplierPowerup.timer--;
                if (multiplierPowerup.timer <= 0) {
                    multiplierPowerup.active = false;
                    return;
                }
                const dxR = redBall.x - multiplierPowerup.x;
                const dyR = redBall.y - multiplierPowerup.y;
                if (Math.hypot(dxR, dyR) < redBall.radius + multiplierPowerup.radius) {
                    applyMultiplierBoost(redBall, multiplierPowerup.value);
                    multiplierPowerup.active = false;
                    createFloatingText(multiplierPowerup.x, multiplierPowerup.y, `${multiplierPowerup.value}x POWER!`, '#ffaa44');
                    return;
                }
                const dxB = blueBall.x - multiplierPowerup.x;
                const dyB = blueBall.y - multiplierPowerup.y;
                if (Math.hypot(dxB, dyB) < blueBall.radius + multiplierPowerup.radius) {
                    applyMultiplierBoost(blueBall, multiplierPowerup.value);
                    multiplierPowerup.active = false;
                    createFloatingText(multiplierPowerup.x, multiplierPowerup.y, `${multiplierPowerup.value}x POWER!`, '#ffaa44');
                    return;
                }
            } else {
                if (Math.random() < 0.012 && gameActive) spawnMultiplierPowerup();
            }
        }
        
        function handleBoundaryAndAttachLine(ball, colorTag) {
            let dx = ball.x - centerX;
            let dy = ball.y - centerY;
            let dist = Math.hypot(dx, dy);
            if (dist + ball.radius >= radius) {
                let nx = dx / dist;
                let ny = dy / dist;
                let overlap = (dist + ball.radius) - radius;
                ball.x -= nx * overlap;
                ball.y -= ny * overlap;
                
                let vdotn = ball.vx * nx + ball.vy * ny;
                ball.vx = ball.vx - 2 * vdotn * nx;
                ball.vy = ball.vy - 2 * vdotn * ny;
                
                let contactX = centerX + nx * (radius);
                let contactY = centerY + ny * (radius);
                
                let multiplierValue = ball.hasBoost ? ball.currentMultiplier : 1;
                
                addAttachedLine(ball, contactX, contactY, colorTag, multiplierValue);
                createFloatingText(ball.x, ball.y, `🧵 ${multiplierValue}x TETHER`, colorTag === 'red' ? '#ff9999' : '#99bbff');
                
                let newDist = Math.hypot(ball.x - centerX, ball.y - centerY);
                if (newDist + ball.radius > radius) {
                    let fixDx = ball.x - centerX;
                    let fixDy = ball.y - centerY;
                    let fixDist = Math.hypot(fixDx, fixDy);
                    let fixNx = fixDx/fixDist;
                    let fixNy = fixDy/fixDist;
                    ball.x = centerX + fixNx * (radius - ball.radius - 0.3);
                    ball.y = centerY + fixNy * (radius - ball.radius - 0.3);
                }
            }
        }
        
        function handleBallCollision(b1, b2) {
            let dx = b2.x - b1.x;
            let dy = b2.y - b1.y;
            let dist = Math.hypot(dx, dy);
            let minDist = b1.radius + b2.radius;
            if (dist < minDist) {
                let angle = Math.atan2(dy, dx);
                let sin = Math.sin(angle);
                let cos = Math.cos(angle);
                let vx1 = b1.vx * cos + b1.vy * sin;
                let vy1 = b1.vy * cos - b1.vx * sin;
                let vx2 = b2.vx * cos + b2.vy * sin;
                let vy2 = b2.vy * cos - b2.vx * sin;
                let temp = vx1;
                vx1 = vx2;
                vx2 = temp;
                b1.vx = vx1 * cos - vy1 * sin;
                b1.vy = vy1 * cos + vx1 * sin;
                b2.vx = vx2 * cos - vy2 * sin;
                b2.vy = vy2 * cos + vx2 * sin;
                let overlap = minDist - dist;
                let corrX = dx / dist * overlap * 0.5;
                let corrY = dy / dist * overlap * 0.5;
                b1.x -= corrX;
                b1.y -= corrY;
                b2.x += corrX;
                b2.y += corrY;
                createFloatingText((b1.x+b2.x)/2, (b1.y+b2.y)/2, '💥 BOUNCE', '#ffcc99');
                if (tg) tg.HapticFeedback.impactOccurred('soft');
            }
        }
        
        function updatePositions() {
            let redSpd = redBall.speedMultiplier;
            let blueSpd = blueBall.speedMultiplier;
            redBall.x += redBall.vx * redSpd;
            redBall.y += redBall.vy * redSpd;
            blueBall.x += blueBall.vx * blueSpd;
            blueBall.y += blueBall.vy * blueSpd;
            
            handleBoundaryAndAttachLine(redBall, 'red');
            handleBoundaryAndAttachLine(blueBall, 'blue');
            handleBallCollision(redBall, blueBall);
            
            function clampInside(ball) {
                let dxc = ball.x - centerX;
                let dyc = ball.y - centerY;
                let d = Math.hypot(dxc, dyc);
                if (d + ball.radius > radius) {
                    let ang = Math.atan2(dyc, dxc);
                    ball.x = centerX + Math.cos(ang) * (radius - ball.radius);
                    ball.y = centerY + Math.sin(ang) * (radius - ball.radius);
                }
            }
            clampInside(redBall);
            clampInside(blueBall);
        }
        
        function draw() {
            if (!ctx) return;
            ctx.clearRect(0, 0, 750, 750);
            
            // White circle wall
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI*2);
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius-2, 0, Math.PI*2);
            ctx.strokeStyle = '#EEEEEE';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius-1, 0, Math.PI*2);
            ctx.fillStyle = '#03060cee';
            ctx.fill();
            
            // Draw lines
            for (let line of redLines) {
                if (!line.ball) continue;
                ctx.beginPath();
                ctx.moveTo(line.ball.x, line.ball.y);
                ctx.lineTo(line.anchorX, line.anchorY);
                ctx.strokeStyle = line.color;
                ctx.lineWidth = 2.2;
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#ff6666';
                ctx.stroke();
            }
            for (let line of blueLines) {
                if (!line.ball) continue;
                ctx.beginPath();
                ctx.moveTo(line.ball.x, line.ball.y);
                ctx.lineTo(line.anchorX, line.anchorY);
                ctx.strokeStyle = line.color;
                ctx.lineWidth = 2.2;
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#4488ff';
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
            
            // Powerup
            if(multiplierPowerup.active) {
                ctx.beginPath();
                ctx.arc(multiplierPowerup.x, multiplierPowerup.y, multiplierPowerup.radius, 0, Math.PI*2);
                ctx.fillStyle = '#ffaa33';
                ctx.shadowBlur = 12;
                ctx.fill();
                ctx.fillStyle = '#000000';
                ctx.font = 'bold 18px monospace';
                ctx.fillText(`${multiplierPowerup.value}x`, multiplierPowerup.x-12, multiplierPowerup.y+7);
                ctx.fillStyle = 'white';
                ctx.fillText(`${multiplierPowerup.value}x`, multiplierPowerup.x-11.5, multiplierPowerup.y+6.5);
                ctx.shadowBlur = 0;
            }
            
            // Balls
            ctx.shadowBlur = 12;
            ctx.shadowColor = redBall.glow;
            ctx.beginPath();
            ctx.arc(redBall.x, redBall.y, redBall.radius, 0, Math.PI*2);
            ctx.fillStyle = redBall.color;
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px "Segoe UI"';
            ctx.fillText('🔴', redBall.x-10, redBall.y+8);
            
            ctx.shadowColor = blueBall.glow;
            ctx.beginPath();
            ctx.arc(blueBall.x, blueBall.y, blueBall.radius, 0, Math.PI*2);
            ctx.fillStyle = blueBall.color;
            ctx.fill();
            ctx.fillText('🔵', blueBall.x-10, blueBall.y+8);
            
            ctx.shadowBlur = 0;
            ctx.font = 'bold 12px monospace';
            ctx.fillStyle = '#ffbb99';
            ctx.fillText(`${redBall.linesCount} lines`, redBall.x-22, redBall.y-14);
            ctx.fillStyle = '#aaddff';
            ctx.fillText(`${blueBall.linesCount} lines`, blueBall.x-22, blueBall.y-14);
            
            if(redBall.hasBoost) {
                ctx.font = 'bold 16px monospace';
                ctx.fillStyle = '#ffaa55';
                ctx.fillText(`${redBall.currentMultiplier}x`, redBall.x-28, redBall.y-18);
            }
            if(blueBall.hasBoost) {
                ctx.fillStyle = '#ffaa55';
                ctx.fillText(`${blueBall.currentMultiplier}x`, blueBall.x-28, blueBall.y-18);
            }
        }
        
        function gameLoop() {
            if (!gameActive && winner) {
                draw();
                return;
            }
            if (!gameActive) {
                draw();
                requestAnimationFrame(gameLoop);
                return;
            }
            updateBoosts();
            updatePowerup();
            updatePositions();
            draw();
            if(checkWinner()) {
                updateUI();
                return;
            }
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function fullReset() {
            if (animationId) cancelAnimationFrame(animationId);
            redLines = [];
            blueLines = [];
            redBall = {
                x: centerX - 85,
                y: centerY - 15,
                vx: 2.5,
                vy: -1.9,
                color: '#ff4444',
                glow: '#ff7777',
                radius: 14,
                speedMultiplier: 1.0,
                speedTimer: 0,
                hasBoost: false,
                linesCount: 0,
                currentMultiplier: 1
            };
            blueBall = {
                x: centerX + 85,
                y: centerY + 20,
                vx: -2.3,
                vy: 1.8,
                color: '#4488ff',
                glow: '#88aaff',
                radius: 14,
                speedMultiplier: 1.0,
                speedTimer: 0,
                hasBoost: false,
                linesCount: 0,
                currentMultiplier: 1
            };
            multiplierPowerup.active = false;
            gameActive = true;
            winner = null;
            winnerDiv.style.display = 'none';
            updateUI();
            animationId = requestAnimationFrame(gameLoop);
            if (tg) tg.HapticFeedback.impactOccurred('medium');
        }
        
        resetBtn.addEventListener('click', fullReset);
        fullReset();
        
        setInterval(() => {
            if(gameActive && !multiplierPowerup.active && Math.random() < 0.4) spawnMultiplierPowerup();
        }, 3500);
    })();
</script>
</body>
</html>
